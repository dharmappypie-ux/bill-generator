<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="278" viewBox="0 0 900 1040" version="1.1" id="nayara-logo">
  <title>Nayara Energy</title>
  <defs>
    <linearGradient id="nyGreen" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#8CC63F" />
      <stop offset="1" stop-color="#2E9B57" />
    </linearGradient>
    <linearGradient id="nyTeal" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#1AA0A8" />
      <stop offset="1" stop-color="#2E9B57" />
    </linearGradient>
    <linearGradient id="nyBlueMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E4E95" />
      <stop offset="1" stop-color="#2E8FC0" />
    </linearGradient>
    <linearGradient id="nyBlueDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16337A" />
      <stop offset="1" stop-color="#2E6FB8" />
    </linearGradient>
    <linearGradient id="nyLight" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#EAF3FA" />
      <stop offset="1" stop-color="#AFD0E6" />
    </linearGradient>
    <linearGradient id="nyBg" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#7FBE5A" />
      <stop offset="0.5" stop-color="#3E9FA8" />
      <stop offset="1" stop-color="#DCEAF4" />
    </linearGradient>
    <linearGradient id="nyLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E9B57" />
      <stop offset="1" stop-color="#1AA0A8" />
    </linearGradient>
    <clipPath id="ball"><circle cx="450" cy="345" r="300" /></clipPath>
  </defs>

  <!-- Woven sphere emblem: crossing ribbons pinched at the centre -->
  <g clip-path="url(#ball)" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linejoin="round">
    <circle cx="450" cy="345" r="300" fill="url(#nyBg)" stroke="none" />
    <!-- band 0: top-left -> bottom-right, green -->
    <path d="M60,60 Q450,295 610,600 L500,650 Q450,320 -20,180 Z" fill="url(#nyGreen)" />
    <!-- band 1: teal -->
    <path d="M170,120 Q450,320 500,650 L360,660 Q450,336 90,250 Z" fill="url(#nyTeal)" />
    <!-- band 2: mid blue -->
    <path d="M270,150 Q450,336 360,660 L215,630 Q450,345 190,300 Z" fill="url(#nyBlueMid)" />
    <!-- band 3: bottom-left -> top-right, dark blue -->
    <path d="M215,630 Q450,345 190,300 L60,60 Q450,295 610,600 Z" fill="url(#nyBlueDark)" opacity="0.0" />
    <!-- band 4 (lower-left dark blue wedge) -->
    <path d="M40,470 Q450,354 630,120 L740,220 Q450,370 130,640 Z" fill="url(#nyBlueDark)" />
    <!-- band 5: light blue upper-right -->
    <path d="M630,120 Q450,354 40,470 L20,360 Q450,345 560,60 Z" fill="url(#nyLight)" />
    <!-- band 6: green sweep lower-right -->
    <path d="M740,220 Q450,370 130,640 L300,700 Q450,380 820,320 Z" fill="url(#nyTeal)" />
  </g>
  <!-- detached leaf below-right -->
  <path d="M470,700 Q640,650 720,700 Q590,762 470,700 Z" fill="url(#nyLeaf)" />

  <!-- Wordmark -->
  <text x="450" y="855" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="700" letter-spacing="6" fill="#16407E">NAYARA</text>
  <!-- Sub-word -->
  <text x="450" y="970" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="400" letter-spacing="34" fill="#16407E">ENERGY</text>
</svg>
