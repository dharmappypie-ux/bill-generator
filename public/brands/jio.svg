<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="96" viewBox="0 0 1000 320" version="1.1" id="jiobp">
  <title>Jio-bp</title>
  <!-- BP Helios sunburst emblem -->
  <g id="helios" transform="translate(150 160)">
    <circle cx="0" cy="0" r="118" fill="#009B3A" />
    <g fill="#8CC63F" stroke="#8CC63F" stroke-width="2">
      <!-- radiating petals, largest at top tapering to smallest at bottom -->
      <path d="M0,-112 L18,-40 L-18,-40 Z" />
      <path d="M55,-98 L26,-33 L4,-45 Z" transform="rotate(30)" />
      <path d="M0,-112 L15,-42 L-15,-42 Z" transform="rotate(60)" />
      <path d="M0,-112 L13,-44 L-13,-44 Z" transform="rotate(90)" />
      <path d="M0,-112 L12,-46 L-12,-46 Z" transform="rotate(120)" />
      <path d="M0,-112 L11,-48 L-11,-48 Z" transform="rotate(150)" />
      <path d="M0,-112 L10,-50 L-10,-50 Z" transform="rotate(180)" />
      <path d="M0,-112 L11,-48 L-11,-48 Z" transform="rotate(210)" />
      <path d="M0,-112 L12,-46 L-12,-46 Z" transform="rotate(240)" />
      <path d="M0,-112 L13,-44 L-13,-44 Z" transform="rotate(270)" />
      <path d="M0,-112 L15,-42 L-15,-42 Z" transform="rotate(300)" />
      <path d="M0,-112 L16,-41 L-16,-41 Z" transform="rotate(330)" />
    </g>
    <circle cx="0" cy="0" r="40" fill="#FFDD00" />
  </g>
  <!-- Wordmark -->
  <text x="320" y="205" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="bold" fill="#0A1F8F" letter-spacing="-4">Jio<tspan fill="#009B3A">-bp</tspan></text>
  <!-- Tagline -->
  <text x="322" y="258" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" letter-spacing="1" fill="#3A3A3A">MOBILITY THAT MOVES YOU</text>
</svg>
